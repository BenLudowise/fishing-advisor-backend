server.port=8080

# Read from environment variable ANTHROPIC_API_KEY. Never commit a real key here.
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.model=claude-sonnet-4-6
anthropic.api.url=https://api.anthropic.com/v1/messages

# Number of free queries before paywall kicks in (Stripe gate comes later)
app.free-query-limit=3
